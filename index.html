<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <title>Stats preview card component</title>
  
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap');
</style>
  
  <link rel="stylesheet" href="style.css">

</head>
<body>
  
  <main class="container">
    <div class="image-container">
      <img class="mobile-img" src="image-header-mobile.jpg" alt="Office Work">
      <img class="desktop-img" src="image-header-desktop.jpg" alt="Office Work" />
    </div>
    
    <div class="content">
      <h1>Get <span class="color">insights</span> that help your business grow.</h1>
      <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
      
      <div class="stats">
        <div class="stats-item">
          <h2>10k+</h2>
          <span>companies</span>
        </div>
        <div class="stats-item">
          <h2>314</h2>
          <span>templates</span>
        </div>
        <div class="stats-item">
          <h2>12m+</h2>
          <span class="last">queries</span>
        </div>
      </div>
      
    </div>
  </main>
  
</body>
</html>
